name: Verify

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Semgrep for bundled rule-pack regression tests
        run: python3 -m pip install semgrep

      - name: Run OpenKit quality gates
        run: npm run verify:all
